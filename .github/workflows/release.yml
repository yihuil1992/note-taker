name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-bundle:
    name: Build Windows bundle
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm tauri build -- --ci

      - name: Create updater manifest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $notes = "Signed updater bundle for Note Taker $tag. Windows installers are not code-signed yet."
          $bundleRoot = "src-tauri/target/release/bundle"
          $updaterBundle = Get-ChildItem -Path "$bundleRoot/nsis/*.exe" | Select-Object -First 1
          if (-not $updaterBundle) {
            $updaterBundle = Get-ChildItem -Path "$bundleRoot/msi/*.msi" | Select-Object -First 1
          }
          if (-not $updaterBundle) {
            throw "No updater bundle was generated."
          }
          $signaturePath = "$($updaterBundle.FullName).sig"
          if (-not (Test-Path -LiteralPath $signaturePath)) {
            throw "No updater signature was generated for $($updaterBundle.Name)."
          }

          $manifest = @{
            version = $version
            notes = $notes
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = (Get-Content -Raw -LiteralPath $signaturePath).Trim()
                url = "https://github.com/yihuil1992/note-taker/releases/download/$tag/$($updaterBundle.Name)"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 8 | Set-Content -LiteralPath "latest.json" -Encoding utf8

      - name: Upload app executable
        uses: actions/upload-artifact@v4
        with:
          name: note-taker-windows-exe
          path: src-tauri/target/release/note-taker.exe
          if-no-files-found: error

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: note-taker-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi.zip
            src-tauri/target/release/bundle/msi/*.msi.zip.sig
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            latest.json
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }
          $tag = "${{ github.ref_name }}"
          $assets = @(
            "src-tauri/target/release/note-taker.exe",
            "latest.json"
          )
          $assets += (Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi").FullName
          $assets += (Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi.sig" -ErrorAction SilentlyContinue).FullName
          $assets += (Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe").FullName
          $assets += (Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe.sig" -ErrorAction SilentlyContinue).FullName
          $assets += (Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi.zip" -ErrorAction SilentlyContinue).FullName
          $assets += (Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi.zip.sig" -ErrorAction SilentlyContinue).FullName
          $assets += (Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.nsis.zip" -ErrorAction SilentlyContinue).FullName
          $assets += (Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.nsis.zip.sig" -ErrorAction SilentlyContinue).FullName
          $assets = $assets | Where-Object { $_ }

          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --title "Note Taker $tag" --notes "Signed updater bundle. Windows installers are not code-signed yet."
          }
